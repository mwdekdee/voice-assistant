<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>เลขาส่วนตัว</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{
  --bg:#0a0a0a;--card:#141414;--card2:#1c1c1c;--card3:#242424;
  --border:#2a2a2a;--text:#f5f5f5;--muted:#666;--muted2:#3a3a3a;
  --purple:#8b7cf8;--purple2:#a78bfa;--purple3:rgba(139,124,248,.15);
  --pink:#f472b6;--green:#34d399;--amber:#fbbf24;--red:#f87171;
  --blue:#60a5fa;--glow:rgba(139,124,248,.25);
}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:90px;overflow-x:hidden}

/* HEADER */
.header{background:linear-gradient(160deg,#1a1030 0%,#0f0a20 60%,#0a0a0a 100%);padding:54px 20px 18px;position:sticky;top:0;z-index:60;border-bottom:1px solid rgba(139,124,248,.12)}
.header-row{display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--purple),var(--pink));display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 16px var(--glow)}
.brand-text h1{font-size:18px;font-weight:700;color:#fff;letter-spacing:.3px}
.brand-text p{font-size:11px;color:var(--muted);margin-top:1px}
.fab{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--pink));border:none;color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 18px var(--glow);transition:transform .15s}
.fab:active{transform:scale(.88)}

/* STATS */
.stats{display:flex;gap:10px;padding:14px 16px 0}
.stat{flex:1;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:13px 10px;text-align:center;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--purple),var(--pink))}
.stat-num{font-size:24px;font-weight:700;color:var(--purple2)}
.stat-label{font-size:11px;color:var(--muted);margin-top:3px}

/* FILTER */
.filter-bar{display:flex;gap:8px;padding:14px 16px 0;overflow-x:auto;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:8px 16px;border-radius:50px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-family:'Sarabun',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap}
.chip.active{background:var(--purple3);color:var(--purple2);border-color:var(--purple)}

/* TASK CARDS */
.list{padding:14px 16px 0}
.empty{text-align:center;color:var(--muted);padding:50px 20px}
.empty-icon{font-size:48px;margin-bottom:10px;opacity:.5}

.task-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:10px;position:relative;overflow:hidden;transition:transform .12s}
.task-card:active{transform:scale(.985)}
.task-card.done{opacity:.4}
.task-card.done .task-title{text-decoration:line-through;color:var(--muted)}
.pri-strip{position:absolute;left:0;top:12px;bottom:12px;width:3px;border-radius:0 3px 3px 0}
.pri-strip.high{background:var(--red)}
.pri-strip.mid{background:var(--amber)}
.pri-strip.low{background:var(--green)}
.task-inner{padding-left:12px}
.task-row1{display:flex;align-items:flex-start;gap:12px}
.check{width:26px;height:26px;flex-shrink:0;border-radius:50%;border:2px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;transition:all .2s;margin-top:1px}
.check.done{background:linear-gradient(135deg,var(--purple),var(--pink));border-color:transparent}
.task-body{flex:1;min-width:0}
.task-title{font-size:16px;font-weight:600;line-height:1.4;word-break:break-word}
.task-note{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.5;word-break:break-word}
.task-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;align-items:center}
.tag{padding:4px 11px;border-radius:50px;font-size:11px;font-weight:600}
.tag-type{background:var(--purple3);color:var(--purple2);border:1px solid rgba(139,124,248,.25)}
.tag-high{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.tag-mid{background:rgba(251,191,36,.1);color:var(--amber);border:1px solid rgba(251,191,36,.2)}
.tag-low{background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.tag-time{margin-left:auto;font-size:11px;color:var(--muted)}
.tag-time.urgent{color:var(--red)}
.task-actions{display:flex;gap:8px;margin-top:12px;border-top:1px solid var(--border);padding-top:10px}
.act-btn{flex:1;padding:8px;border-radius:10px;border:none;font-family:'Sarabun',sans-serif;font-size:13px;cursor:pointer;transition:background .15s}
.act-edit{background:var(--purple3);color:var(--purple2)}
.act-del{background:rgba(248,113,113,.08);color:var(--red)}
.act-btn:active{opacity:.7}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);z-index:100;display:none;align-items:flex-end;justify-content:center}
.overlay.show{display:flex}
.modal{width:100%;max-width:430px;background:#111;border-radius:28px 28px 0 0;border-top:1px solid rgba(139,124,248,.2);padding:0 0 40px;max-height:92vh;overflow-y:auto;animation:up .28s cubic-bezier(.16,1,.3,1)}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;border-radius:50px;background:var(--muted2);margin:14px auto 0}
.modal-header{padding:16px 20px 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:18px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:50%;background:var(--card2);border:none;color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-body{padding:16px 20px 0}

.form-label{font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:block}
.form-group{margin-bottom:14px}

/* MIC INPUT ROW */
.mic-input-row{display:flex;gap:8px;align-items:flex-start}
.mic-input-row input{flex:1}
.mic-btn-sm{
  width:48px;height:48px;flex-shrink:0;border-radius:14px;
  background:var(--purple3);border:1.5px solid var(--purple);
  color:var(--purple2);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.mic-btn-sm.listening{
  background:rgba(248,113,113,.15);border-color:var(--red);
  color:var(--red);animation:mic-pulse 1s ease-in-out infinite;
}
@keyframes mic-pulse{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)}50%{box-shadow:0 0 0 8px rgba(248,113,113,0)}}

input[type=text],textarea,select{
  width:100%;background:var(--card2);border:1px solid var(--border);
  border-radius:14px;padding:13px 15px;color:var(--text);
  font-family:'Sarabun',sans-serif;font-size:15px;outline:none;
  -webkit-appearance:none;transition:border-color .15s;
}
input[type=text]:focus,textarea:focus,select:focus{border-color:var(--purple)}
textarea{min-height:70px;resize:none;line-height:1.6}
select option{background:#1c1c1c}

/* MIC HINT */
.mic-hint{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.6;padding:8px 12px;background:var(--card2);border-radius:10px;border-left:2px solid var(--purple)}

/* DATE ROW */
.dt-row{display:flex;gap:10px}
.dt-box{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:8px;transition:border-color .15s}
.dt-box:focus-within{border-color:var(--purple)}
.dt-icon{font-size:16px;flex-shrink:0}
.dt-box input{border:none;background:none;padding:0;border-radius:0;font-size:14px;color:var(--text);width:100%;font-family:'Sarabun',sans-serif;outline:none}
.dt-box input::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.4;cursor:pointer}

/* DRUM TIME */
.time-picker-wrap{background:var(--card2);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.drum-row{display:flex}
.drum-col{flex:1;height:200px;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:relative}
.drum-col::-webkit-scrollbar{display:none}
.drum-col::before,.drum-col::after{content:'';display:block;height:80px}
.drum-item{height:40px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;color:var(--muted);scroll-snap-align:center;cursor:pointer}
.drum-item.selected{color:#fff;font-size:22px}
.drum-sep{display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:var(--muted);padding:0 2px}
.drum-overlay{position:absolute;left:0;right:0;top:0;bottom:0;pointer-events:none}
.drum-overlay::before{content:'';position:absolute;left:0;right:0;top:0;height:80px;background:linear-gradient(to bottom,var(--card2),transparent)}
.drum-overlay::after{content:'';position:absolute;left:0;right:0;bottom:0;height:80px;background:linear-gradient(to top,var(--card2),transparent)}
.drum-selected-line{position:absolute;left:8px;right:8px;top:50%;transform:translateY(-50%);border-top:1px solid var(--purple);border-bottom:1px solid var(--purple);height:40px;border-radius:8px;background:rgba(139,124,248,.08);pointer-events:none}

/* TIME LABEL */
.time-label{text-align:center;padding:8px;font-size:13px;color:var(--muted);border-top:1px solid var(--border)}
#timePreview{color:var(--purple2);font-weight:700;font-size:15px}

/* PRIORITY */
.pri-group{display:flex;gap:8px}
.pri-pill{flex:1;padding:11px 8px;border-radius:12px;border:1.5px solid var(--border);background:var(--card2);color:var(--muted);font-family:'Sarabun',sans-serif;font-size:14px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.pri-pill.sel-high{border-color:var(--red);background:rgba(248,113,113,.1);color:var(--red)}
.pri-pill.sel-mid{border-color:var(--amber);background:rgba(251,191,36,.1);color:var(--amber)}
.pri-pill.sel-low{border-color:var(--green);background:rgba(52,211,153,.1);color:var(--green)}

.save-btn{width:100%;padding:16px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;font-family:'Sarabun',sans-serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 6px 24px var(--glow);transition:transform .15s;margin-top:16px}
.save-btn:active{transform:scale(.97)}
.cancel-btn{width:100%;padding:13px;border-radius:16px;border:1px solid var(--border);background:none;color:var(--muted);font-family:'Sarabun',sans-serif;font-size:15px;cursor:pointer;margin-top:8px}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(14,14,14,.97);border-top:1px solid var(--border);backdrop-filter:blur(20px);display:flex;z-index:60;padding-bottom:env(safe-area-inset-bottom)}
.nav-it{flex:1;padding:12px 4px 10px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.nav-ico{font-size:22px}
.nav-lbl{font-size:10px;color:var(--muted)}
.nav-it.active .nav-lbl{color:var(--purple2)}

/* TOAST */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-8px);background:var(--card2);border:1px solid rgba(139,124,248,.3);border-radius:50px;padding:10px 22px;font-size:14px;z-index:999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="header">
  <div class="header-row">
    <div class="brand">
      <div class="brand-icon">🤖</div>
      <div class="brand-text">
        <h1>เลขาส่วนตัว</h1>
        <p>จัดการงาน</p>
      </div>
    </div>
    <button class="fab" onclick="openModal()">+</button>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-num" id="s-all">0</div><div class="stat-label">ทั้งหมด</div></div>
  <div class="stat"><div class="stat-num" id="s-today">0</div><div class="stat-label">วันนี้</div></div>
  <div class="stat"><div class="stat-num" id="s-done">0</div><div class="stat-label">เสร็จแล้ว</div></div>
</div>

<div class="filter-bar">
  <button class="chip active" onclick="setFilter('all',this)">ทั้งหมด</button>
  <button class="chip" onclick="setFilter('work',this)">💼 งาน</button>
  <button class="chip" onclick="setFilter('health',this)">💊 สุขภาพ</button>
  <button class="chip" onclick="setFilter('finance',this)">💰 การเงิน</button>
  <button class="chip" onclick="setFilter('shopping',this)">🛍 ช๊อปปิ้ง</button>
  <button class="chip" onclick="setFilter('other',this)">📌 อื่นๆ</button>
  <button class="chip" onclick="setFilter('done',this)">✅ เสร็จแล้ว</button>
</div>

<div class="list" id="taskList"></div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="handleOvClick(event)">
<div class="modal" id="modal">
  <div class="modal-handle"></div>
  <div class="modal-header">
    <div class="modal-title" id="modalTitle">➕ เพิ่มงานใหม่</div>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-body">

    <div class="form-group">
      <label class="form-label">ชื่องาน</label>
      <div class="mic-input-row">
        <input type="text" id="fTitle" placeholder="พิมพ์หรือกดไมค์พูดได้เลย...">
        <button class="mic-btn-sm" id="micBtn" onclick="toggleMic()" title="พูดสั่งงาน">🎤</button>
      </div>
      <div class="mic-hint" id="micHint">
        💡 ตัวอย่างพูด: <b>"ประชุมทีมพรุ่งนี้บ่ายสอง"</b> หรือ <b>"ซื้อนม วันนี้เย็น"</b>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">รายละเอียด</label>
      <textarea id="fNote" placeholder="รายละเอียดเพิ่มเติม..."></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">วันที่</label>
      <div class="dt-box" style="border-radius:14px">
        <span class="dt-icon">📅</span>
        <input type="date" id="fDate">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">เวลาแจ้งเตือน (24 ชม.)</label>
      <div class="time-picker-wrap">
        <div class="drum-row">
          <div class="drum-col" id="drumH">
            <div class="drum-selected-line"></div>
            <div class="drum-overlay"></div>
          </div>
          <div class="drum-sep">:</div>
          <div class="drum-col" id="drumM">
            <div class="drum-selected-line"></div>
            <div class="drum-overlay"></div>
          </div>
        </div>
        <div class="time-label">เวลาที่เลือก: <span id="timePreview">08:00 น.</span></div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">หมวดหมู่</label>
      <select id="fType">
        <option value="work">💼 งาน</option>
        <option value="health">💊 สุขภาพ</option>
        <option value="finance">💰 การเงิน</option>
        <option value="shopping">🛍 ช๊อปปิ้ง</option>
        <option value="other">📌 อื่นๆ</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">ความสำคัญ</label>
      <div class="pri-group">
        <button class="pri-pill" id="pH" onclick="setPri('high')">🔴 สูง</button>
        <button class="pri-pill sel-mid" id="pM" onclick="setPri('mid')">🟡 กลาง</button>
        <button class="pri-pill" id="pL" onclick="setPri('low')">🟢 ต่ำ</button>
      </div>
    </div>

    <button class="save-btn" onclick="saveTask()">💾 บันทึก</button>
    <button class="cancel-btn" onclick="closeModal()">ยกเลิก</button>
  </div>
</div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-it active" id="nav-all" onclick="setFilter('all',null);setNavActive('nav-all')">
    <span class="nav-ico">📋</span><span class="nav-lbl">ทั้งหมด</span>
  </div>
  <div class="nav-it" id="nav-urgent" onclick="setFilter('high-pri',null);setNavActive('nav-urgent')">
    <span class="nav-ico">🔴</span><span class="nav-lbl">ด่วน</span>
  </div>
  <div class="nav-it" onclick="openModal()">
    <span class="nav-ico">➕</span><span class="nav-lbl">เพิ่ม</span>
  </div>
  <div class="nav-it" id="nav-today" onclick="setFilter('today',null);setNavActive('nav-today')">
    <span class="nav-ico">📅</span><span class="nav-lbl">วันนี้</span>
  </div>
  <div class="nav-it" id="nav-done" onclick="setFilter('done',null);setNavActive('nav-done')">
    <span class="nav-ico">✅</span><span class="nav-lbl">เสร็จ</span>
  </div>
</div>

<script>
// ══ DATA ══
let tasks = JSON.parse(localStorage.getItem('va_tasks3')||'[]');
let editId=null, curFilter='all', curPri='mid';

const TYPE_MAP={work:'💼 งาน',health:'💊 สุขภาพ',finance:'💰 การเงิน',shopping:'🛍 ช๊อปปิ้ง',other:'📌 อื่นๆ'};
const PRI_MAP={high:'สูง',mid:'กลาง',low:'ต่ำ'};

function save(){localStorage.setItem('va_tasks3',JSON.stringify(tasks))}

// ══ TOAST ══
function toast(m){
  const el=document.getElementById('toast');
  el.textContent=m;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

// ══ DRUM TIME PICKER (24hr) ══
let dH=8, dM=0;

function buildDrum(colId, items, initVal, onChange){
  const col=document.getElementById(colId);
  [...col.children].forEach(c=>{
    if(!c.classList.contains('drum-selected-line')&&!c.classList.contains('drum-overlay')) c.remove();
  });
  const frag=document.createDocumentFragment();
  items.forEach(v=>{
    const div=document.createElement('div');
    div.className='drum-item'+(v===initVal?' selected':'');
    div.textContent=String(v).padStart(2,'0');
    div.dataset.val=v;
    frag.appendChild(div);
  });
  col.insertBefore(frag, col.querySelector('.drum-overlay'));
  const all=[...col.querySelectorAll('.drum-item')];
  const idx=all.findIndex(el=>Number(el.dataset.val)===initVal);
  if(idx>=0) col.scrollTop=idx*40;

  col.addEventListener('scroll',()=>{
    const ci=Math.round((col.scrollTop)/40);
    all.forEach((el,i)=>el.classList.toggle('selected',i===ci));
    if(all[ci]){
      onChange(Number(all[ci].dataset.val));
      updateTimePreview();
    }
  },{passive:true});
  col.addEventListener('click',e=>{
    if(!e.target.classList.contains('drum-item')) return;
    const i=all.indexOf(e.target);
    col.scrollTo({top:i*40,behavior:'smooth'});
  });
}

function initDrums(h=8,m=0){
  dH=h;dM=m;
  buildDrum('drumH',[...Array(24)].map((_,i)=>i),h,v=>{dH=v});
  buildDrum('drumM',[...Array(60)].map((_,i)=>i),m,v=>{dM=v});
  updateTimePreview();
}

function updateTimePreview(){
  document.getElementById('timePreview').textContent=`${String(dH).padStart(2,'0')}:${String(dM).padStart(2,'0')} น.`;
}

function getTime(){return `${String(dH).padStart(2,'0')}:${String(dM).padStart(2,'0')}`}

// ══ SPEECH ══
let recog=null, isListening=false;

function toggleMic(){
  if(isListening){stopMic();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('⚠️ เบราว์เซอร์นี้ไม่รองรับเสียง');return;}
  isListening=true;
  const btn=document.getElementById('micBtn');
  const hint=document.getElementById('micHint');
  btn.classList.add('listening');
  btn.textContent='⏹';
  hint.innerHTML='🔴 <b>กำลังฟัง...</b> พูดชื่องานได้เลย';

  recog=new SR();
  recog.lang='th-TH';
  recog.interimResults=true;
  recog.continuous=false;

  recog.onresult=e=>{
    let txt='';
    for(let i=e.resultIndex;i<e.results.length;i++) txt+=e.results[i][0].transcript;
    document.getElementById('fTitle').value=txt;
    if(e.results[e.results.length-1].isFinal) parseVoice(txt);
  };
  recog.onerror=()=>stopMic();
  recog.onend=()=>stopMic();
  recog.start();
}

function stopMic(){
  isListening=false;
  const btn=document.getElementById('micBtn');
  const hint=document.getElementById('micHint');
  btn.classList.remove('listening');
  btn.textContent='🎤';
  hint.innerHTML='💡 ตัวอย่างพูด: <b>"ประชุมทีมพรุ่งนี้บ่ายสอง"</b> หรือ <b>"ซื้อนม วันนี้เย็น"</b>';
  if(recog){try{recog.stop()}catch(e){}recog=null;}
}

function parseVoice(txt){
  const t=txt.toLowerCase();
  // วันที่
  const tod=today();
  let d=tod;
  if(t.includes('พรุ่งนี้')){const dt=new Date();dt.setDate(dt.getDate()+1);d=dt.toISOString().slice(0,10);}
  else if(t.includes('มะรืน')){const dt=new Date();dt.setDate(dt.getDate()+2);d=dt.toISOString().slice(0,10);}
  document.getElementById('fDate').value=d;

  // เวลา (24hr)
  const morn=t.match(/(\d+)\s*โมงเช้า/);
  const aft=t.match(/บ่าย\s*(\d+)/);
  const eve=t.match(/(\d+)\s*โมงเย็น/);
  const night=t.match(/(\d+)\s*ทุ่ม/);
  const oclock=t.match(/(\d+)\s*นาฬิกา/);
  const timeRaw=t.match(/(\d{1,2}):(\d{2})/);

  let h=-1,m=0;
  if(morn){h=parseInt(morn[1]);}
  else if(aft){h=parseInt(aft[1])+12; if(h>=24)h-=12;}
  else if(eve){h=parseInt(eve[1])+12;}
  else if(night){h=parseInt(night[1])+18; if(h>=24)h-=24;}
  else if(oclock){h=parseInt(oclock[1]);}
  else if(timeRaw){h=parseInt(timeRaw[1]);m=parseInt(timeRaw[2]);}

  if(h>=0&&h<24){
    setTimeout(()=>{initDrums(h,m);},100);
  }

  // ประเภท
  if(t.includes('ซื้อ')||t.includes('ช้อป')||t.includes('สั่ง')) document.getElementById('fType').value='shopping';
  else if(t.includes('หมอ')||t.includes('ยา')||t.includes('ออกกำลัง')) document.getElementById('fType').value='health';
  else if(t.includes('โอน')||t.includes('จ่าย')||t.includes('เงิน')) document.getElementById('fType').value='finance';
  else if(t.includes('ประชุม')||t.includes('งาน')||t.includes('รายงาน')) document.getElementById('fType').value='work';
}

// ══ MODAL ══
function openModal(id){
  editId=id||null;
  document.getElementById('modalTitle').textContent=id?'✏️ แก้ไขงาน':'➕ เพิ่มงานใหม่';
  if(id){
    const t=tasks.find(x=>x.id===id);
    document.getElementById('fTitle').value=t.title;
    document.getElementById('fNote').value=t.note||'';
    document.getElementById('fType').value=t.type;
    document.getElementById('fDate').value=t.date||'';
    setPri(t.priority||'mid');
    const [hh,mm]=(t.time||'08:00').split(':').map(Number);
    setTimeout(()=>initDrums(hh,mm),50);
  } else {
    document.getElementById('fTitle').value='';
    document.getElementById('fNote').value='';
    document.getElementById('fType').value='work';
    document.getElementById('fDate').value=today();
    setPri('mid');
    setTimeout(()=>initDrums(8,0),50);
  }
  document.getElementById('overlay').classList.add('show');
  setTimeout(()=>document.getElementById('fTitle').focus(),350);
}

function closeModal(){
  stopMic();
  document.getElementById('overlay').classList.remove('show');
  editId=null;
}

function handleOvClick(e){if(e.target===document.getElementById('overlay'))closeModal();}

function setPri(p){
  curPri=p;
  document.getElementById('pH').className='pri-pill'+(p==='high'?' sel-high':'');
  document.getElementById('pM').className='pri-pill'+(p==='mid'?' sel-mid':'');
  document.getElementById('pL').className='pri-pill'+(p==='low'?' sel-low':'');
}

function today(){return new Date().toISOString().slice(0,10)}

// ══ SAVE ══
function saveTask(){
  const title=document.getElementById('fTitle').value.trim();
  if(!title){toast('กรุณาใส่ชื่องาน');return;}
  const task={
    id:editId||Date.now(),title,
    note:document.getElementById('fNote').value.trim(),
    type:document.getElementById('fType').value,
    priority:curPri,
    date:document.getElementById('fDate').value,
    time:getTime(),
    done:editId?(tasks.find(x=>x.id===editId)?.done||false):false,
    created:editId?(tasks.find(x=>x.id===editId)?.created||Date.now()):Date.now()
  };
  if(editId){tasks=tasks.map(t=>t.id===editId?task:t);toast('✅ แก้ไขแล้ว!');}
  else{tasks.unshift(task);toast('✅ บันทึกแล้ว!');scheduleNotif(task);}
  save();closeModal();render();
}

function deleteTask(id){
  if(!confirm('ลบงานนี้?'))return;
  tasks=tasks.filter(t=>t.id!==id);save();render();toast('🗑 ลบแล้ว');
}

function toggleDone(id){
  tasks=tasks.map(t=>t.id===id?{...t,done:!t.done}:t);save();render();
}

// ══ NOTIF ══
function scheduleNotif(task){
  if(!task.date||!task.time)return;
  if(!('Notification' in window))return;
  Notification.requestPermission().then(p=>{
    if(p!=='granted')return;
    const dt=new Date(task.date+'T'+task.time);
    const ms=dt.getTime()-Date.now();
    if(ms<=0)return;
    setTimeout(()=>{
      new Notification('⏰ '+task.title,{body:task.note||TYPE_MAP[task.type]});
      if(navigator.vibrate)navigator.vibrate([400,150,400]);
    },ms);
  });
}
function reSchedule(){tasks.filter(t=>!t.done&&t.date&&t.time).forEach(scheduleNotif)}

// ══ FORMAT ══
function fmtDT(date,time){
  if(!date)return null;
  const d=new Date(date+'T'+(time||'00:00'));
  const now=new Date();
  const diff=d-now;
  const dd=d.getDate(),mo=d.getMonth()+1;
  const hh=String(d.getHours()).padStart(2,'0'),mm=String(d.getMinutes()).padStart(2,'0');
  if(diff<0)return{text:`เลย ${dd}/${mo} ${hh}:${mm} น.`,urgent:true};
  const days=Math.floor(diff/86400000);
  if(days===0)return{text:`วันนี้ ${hh}:${mm} น.`,urgent:diff<3600000};
  if(days===1)return{text:`พรุ่งนี้ ${hh}:${mm} น.`,urgent:false};
  return{text:`${dd}/${mo} ${hh}:${mm} น.`,urgent:false};
}
function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ══ FILTER ══
function setFilter(f,el){
  curFilter=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  if(el)el.classList.add('active');
  render();
}
function setNavActive(id){
  document.querySelectorAll('.nav-it').forEach(n=>n.classList.remove('active'));
  const el=document.getElementById(id);
  if(el)el.classList.add('active');
}

// ══ RENDER ══
function render(){
  const tod=today();
  const priO={high:0,mid:1,low:2};
  let filtered=tasks.filter(t=>{
    if(curFilter==='all')return !t.done;
    if(curFilter==='done')return t.done;
    if(curFilter==='high-pri')return !t.done&&t.priority==='high';
    if(curFilter==='today')return !t.done&&t.date===tod;
    return !t.done&&t.type===curFilter;
  });
  filtered.sort((a,b)=>{
    if(a.done!==b.done)return a.done?1:-1;
    const pd=priO[a.priority||'mid']-priO[b.priority||'mid'];
    if(pd!==0)return pd;
    if(a.date&&b.date){
      return new Date(a.date+'T'+(a.time||'00:00'))-new Date(b.date+'T'+(b.time||'00:00'));
    }
    if(a.date)return -1;if(b.date)return 1;
    return b.created-a.created;
  });
  document.getElementById('s-all').textContent=tasks.filter(t=>!t.done).length;
  document.getElementById('s-today').textContent=tasks.filter(t=>!t.done&&t.date===tod).length;
  document.getElementById('s-done').textContent=tasks.filter(t=>t.done).length;

  const list=document.getElementById('taskList');
  if(!filtered.length){
    list.innerHTML=`<div class="empty"><div class="empty-icon">${curFilter==='done'?'🎉':'📭'}</div><p>${curFilter==='done'?'ยังไม่มีงานที่เสร็จ':'ไม่มีงานในหมวดนี้'}</p></div>`;
    return;
  }
  list.innerHTML=filtered.map(t=>{
    const dt=fmtDT(t.date,t.time);
    return `
    <div class="task-card ${t.done?'done':''}">
      <div class="pri-strip ${t.priority||'mid'}"></div>
      <div class="task-inner">
        <div class="task-row1">
          <button class="check ${t.done?'done':''}" onclick="toggleDone(${t.id})">${t.done?'✓':''}</button>
          <div class="task-body">
            <div class="task-title">${escH(t.title)}</div>
            ${t.note?`<div class="task-note">${escH(t.note)}</div>`:''}
          </div>
        </div>
        <div class="task-tags">
          <span class="tag tag-type">${TYPE_MAP[t.type]||t.type}</span>
          <span class="tag tag-${t.priority||'mid'}">${PRI_MAP[t.priority||'mid']}</span>
          ${dt?`<span class="tag-time ${dt.urgent?'urgent':''}">⏰ ${dt.text}</span>`:''}
        </div>
        <div class="task-actions">
          <button class="act-btn act-edit" onclick="openModal(${t.id})">✏️ แก้ไข</button>
          <button class="act-btn act-del" onclick="deleteTask(${t.id})">🗑 ลบ</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

if('Notification' in window)Notification.requestPermission();
reSchedule();
render();
</script>
